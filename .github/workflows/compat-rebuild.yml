name: Rebuild Compatibility Data

on:
  workflow_dispatch:
  issues:
    types: [deleted, closed, reopened, edited]
  issue_comment:
    types: [deleted, edited]

permissions:
  contents: write
  issues: read

concurrency:
  group: compat-data
  cancel-in-progress: false

jobs:
  rebuild:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'compat-report')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Rebuild compatibility.json from GitHub issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── Carry-forward data ─────────────────────────────────
            // Tags and screenshots are not stored in issue markdown,
            // so we preserve them from the existing compatibility.json.
            const existingGames = JSON.parse(
              fs.readFileSync('data/compatibility.json', 'utf8')
            );
            const carryForward = new Map();
            for (const game of existingGames) {
              carryForward.set(game.titleId.toUpperCase(), {
                tags: game.tags || [],
                screenshots: game.screenshots || [],
              });
            }

            // ── Fetch all open compat-report issues (paginated) ────
            let allIssues = [];
            let page = 1;
            while (true) {
              const resp = await github.rest.issues.listForRepo({
                ...context.repo,
                labels: 'compat-report',
                state: 'open',
                per_page: 100,
                page,
              });
              allIssues.push(...resp.data);
              if (resp.data.length < 100) break;
              page++;
            }
            console.log(`Fetched ${allIssues.length} open compat-report issues`);

            // ── Normalization helpers ───────────────────────────────

            function normalizeStatus(raw) {
              const lower = raw.toLowerCase();
              if (lower.includes('playable')) return 'playable';
              if (lower.includes('ingame') || lower.includes('in-game') || lower.includes('in game')) return 'ingame';
              if (lower.includes('intro')) return 'intro';
              if (lower.includes('loads')) return 'loads';
              if (lower.includes('nothing')) return 'nothing';
              return null;
            }

            function normalizePerf(raw) {
              const lower = raw.toLowerCase();
              if (lower.includes('great')) return 'great';
              if (lower.includes('ok')) return 'ok';
              if (lower.includes('poor')) return 'poor';
              if (lower.includes('n/a') || lower.includes('not applicable')) return 'n/a';
              return null;
            }

            function normalizePlatform(raw) {
              const lower = raw.toLowerCase();
              if (lower.includes('ios')) return 'ios';
              if (lower.includes('macos')) return 'macos';
              return null;
            }

            function normalizeArch(raw) {
              const lower = raw.toLowerCase();
              if (lower.includes('arm64')) return 'arm64';
              if (lower.includes('x86_64') || lower.includes('x86')) return 'x86_64';
              return null;
            }

            function normalizeGpuBackend(raw) {
              const lower = raw.toLowerCase();
              if (lower.includes('msl')) return 'msl';
              if (lower.includes('msc')) return 'msc';
              return null;
            }

            function parseSource(text) {
              if (!text) return undefined;
              if (text.includes('in-app')) return 'app';
              if (text.includes('Submitted via app')) return 'app';
              if (text.includes('Discord')) return 'discord';
              if (text.includes('GitHub issue')) return 'github';
              return undefined;
            }

            function slugify(name) {
              return name
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
            }

            // ── Parse a single report from markdown text ───────────

            function parseReport(text, createdAt) {
              if (!text || !text.includes('| Field | Value |')) return null;

              const lines = text.split('\n');
              const fields = {};
              let inTable = false;

              for (const line of lines) {
                if (line.includes('| Field | Value |')) {
                  inTable = true;
                  continue;
                }
                if (inTable && line.match(/^\|[\s-]+\|[\s-]+\|$/)) continue;
                if (inTable && line.startsWith('|') && line.includes('|')) {
                  const cells = line.split('|').map(c => c.trim()).filter(Boolean);
                  if (cells.length >= 2) {
                    const key = cells[0].replace(/\*\*/g, '').trim();
                    const val = cells[1].replace(/`/g, '').trim();
                    if (key && val) fields[key] = val;
                  }
                } else if (inTable && !line.startsWith('|')) {
                  inTable = false;
                }
              }

              const status = normalizeStatus(fields['Status'] || '');
              if (!status) return null;

              const platform = normalizePlatform(fields['Platform'] || '');
              if (!platform) return null;

              const device = fields['Device'] || '';
              if (!device) return null;

              let osVersion = fields['OS Version'] || '';
              osVersion = osVersion.replace(/^(iOS|macOS|iPadOS)\s*/i, '').trim();
              if (!osVersion) return null;

              const arch = normalizeArch(fields['Architecture'] || '') || 'arm64';
              const gpuBackend = normalizeGpuBackend(fields['GPU Backend'] || '') || 'msl';
              const perf = normalizePerf(fields['Performance'] || '');
              const submittedBy = fields['Submitted By'] || undefined;

              // Extract notes between "### Notes" and "---"
              const notesMatch = text.match(
                /###\s*Notes\s*\n([\s\S]*?)(?=\n---|\n###\s*Screenshots?|\n<!-- xenios-auto -->|$)/
              );
              const notes = notesMatch ? notesMatch[1].trim() : '';

              const source = parseSource(text);
              const date = new Date(createdAt).toISOString().slice(0, 10);

              return {
                device,
                platform,
                osVersion,
                arch,
                gpuBackend,
                status,
                date,
                notes,
                ...(perf ? { _perf: perf } : {}),
                ...(submittedBy ? { submittedBy } : {}),
                ...(source ? { source } : {}),
              };
            }

            // ── Parse issue title ──────────────────────────────────

            function parseIssueTitle(title) {
              const match = title.match(
                /^\[?([A-Fa-f0-9]{8})\]?\s*[—–\-]\s*(.+?)$/
              );
              if (!match) return null;
              return {
                titleId: match[1].toUpperCase(),
                gameName: match[2].trim(),
              };
            }

            // ── Process each issue ─────────────────────────────────

            const games = [];
            const seenTitleIds = new Set();

            for (const issue of allIssues) {
              const titleInfo = parseIssueTitle(issue.title);
              if (!titleInfo) {
                console.log(`Skipping issue #${issue.number}: title doesn't match expected format`);
                continue;
              }

              const { titleId, gameName } = titleInfo;

              if (seenTitleIds.has(titleId)) {
                console.log(`Skipping issue #${issue.number}: duplicate titleId ${titleId}`);
                continue;
              }
              seenTitleIds.add(titleId);

              const reports = [];

              // Parse issue body
              if (issue.body) {
                const bodyReport = parseReport(issue.body, issue.created_at);
                if (bodyReport) reports.push(bodyReport);
              }

              // Fetch all comments (paginated)
              let commentPage = 1;
              while (true) {
                const commResp = await github.rest.issues.listComments({
                  ...context.repo,
                  issue_number: issue.number,
                  per_page: 100,
                  page: commentPage,
                });

                for (const comment of commResp.data) {
                  const commentReport = parseReport(comment.body, comment.created_at);
                  if (commentReport) reports.push(commentReport);
                }

                if (commResp.data.length < 100) break;
                commentPage++;
              }

              if (reports.length === 0) {
                console.log(`Skipping issue #${issue.number} (${titleId}): no valid reports`);
                continue;
              }

              // Sort reports by date descending (newest first)
              reports.sort((a, b) => b.date.localeCompare(a.date));

              // Game-level perf from newest report
              const gamePerf = reports[0]._perf
                || (reports[0].status === 'nothing' ? 'n/a' : null)
                || reports.find(r => r._perf)?._perf
                || 'n/a';

              // Unique platforms
              const platforms = [...new Set(reports.map(r => r.platform))];

              // Strip temporary _perf from reports
              const cleanReports = reports.map(({ _perf, ...rest }) => rest);
              const latest = cleanReports[0];

              // Carry forward tags and screenshots
              const existing = carryForward.get(titleId);

              games.push({
                slug: slugify(gameName),
                title: gameName,
                titleId,
                status: latest.status,
                perf: gamePerf,
                tags: existing ? existing.tags : [],
                platforms,
                lastReport: {
                  device: latest.device,
                  platform: latest.platform,
                  osVersion: latest.osVersion,
                  arch: latest.arch,
                  gpuBackend: latest.gpuBackend,
                },
                updatedAt: latest.date,
                notes: latest.notes,
                reports: cleanReports,
                screenshots: existing ? existing.screenshots : [],
              });

              console.log(`${titleId} — ${gameName}: ${cleanReports.length} reports, status=${latest.status}`);
            }

            // ── Write rebuilt data ─────────────────────────────────

            fs.writeFileSync(
              'data/compatibility.json',
              JSON.stringify(games, null, 2) + '\n'
            );

            console.log(`\nRebuilt: ${games.length} games (was ${existingGames.length})`);

            const removed = existingGames.filter(
              g => !seenTitleIds.has(g.titleId.toUpperCase())
            );
            if (removed.length > 0) {
              console.log(`Removed ${removed.length} games:`);
              removed.forEach(g => console.log(`  - ${g.title} (${g.titleId})`));
            }

      - name: Refresh discussion snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          node scripts/build-discussions.mjs
          node scripts/sync-public-compat-data.mjs

      - name: Commit rebuilt data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add data/compatibility.json data/discussions.json public/compatibility/data.json public/compatibility/discussions.json
          if ! git diff --staged --quiet; then
            git commit -m "compat: rebuild from GitHub issues"
            git push
          else
            echo "No changes to commit"
          fi
