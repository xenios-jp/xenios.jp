name: Sync Compatibility Table

on:
  workflow_dispatch:
  push:
    paths:
      - "data/compatibility.json"
      - "data/discussions.json"
      - "data/release-builds.json"
      - "data/builds-history.json"
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: compat-sync
  cancel-in-progress: false

jobs:
  generate-table:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Generate COMPATIBILITY.md
        run: node scripts/generate-compatibility-markdown.mjs

      - name: Sync public compatibility data
        run: node scripts/sync-public-compat-data.mjs

      - name: Commit mirrored public data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COMPATIBILITY.md public/compatibility/data.json public/compatibility/discussions.json public/builds/release-builds.json public/builds/history.json
          if ! git diff --staged --quiet; then
            git commit -m "docs: sync public compatibility data [skip ci]"
            git push
          else
            echo "No changes"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: generate-table
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
