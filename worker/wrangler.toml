name = "xenios-compat-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Set these via `wrangler secret put <KEY>`
# GITHUB_TOKEN            – fine-grained PAT with Contents + Issues read/write on xenios-jp/game-compatibility
# DISCORD_WEBHOOK         – webhook URL from your #compat-reports channel
# DISCORD_BOARD_WEBHOOK   – webhook URL from your #compatibility board channel
# DISCORD_BOARD_MESSAGE_ID – message ID of the board embed (logged on first post, set after)
# API_KEY                 – a random secret you embed in the iOS/macOS app
# DISCORD_APPLICATION_ID  – your Discord application ID (from Developer Portal → General)
# DISCORD_PUBLIC_KEY      – your Discord public key (from Developer Portal → General, for Ed25519 verification)
# COMPAT_REPO_OWNER       – optional override; defaults to xenios-jp
# COMPAT_REPO_NAME        – optional override; defaults to game-compatibility
# COMPAT_REPO_BRANCH      – optional override; defaults to main
# COMPAT_RELEASE_MANIFEST_URL – optional override for the public release-build manifest URL
# COMPAT_WEBSITE_BASE     – optional override for xenios.jp links in embeds
